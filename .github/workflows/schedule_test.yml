name: Schedule Test

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  test-schedule:
    name: Test schedule trigger
    runs-on: ubuntu-latest

    steps:
      - name: Print date
        run: |
          echo "Schedule test started"
          date -u
          echo "GitHub event: ${{ github.event_name }}"